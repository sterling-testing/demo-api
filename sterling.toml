# Sterling SDK Generator Configuration for sterling-testing/demo-api
# Generates typed SDKs from the Task Manager API

[project]
name = "taskmanager-sdk"
version = "0.2.0"
description = "Task Manager API - a demo for Sterling SDK generation"

[targets.typescript]
language = "typescript"
repository = "sterling-testing/taskmanager-ts"
output_dir = "../generated/typescript"

[targets.python]
language = "python"
repository = "sterling-testing/taskmanager-python"
output_dir = "../generated/python"

[targets.rust]
language = "rust"
repository = "sterling-testing/taskmanager-rust"
output_dir = "../generated/rust"

[targets.go]
language = "go"
repository = "sterling-testing/taskmanager-go"
output_dir = "../generated/go"

[targets.dart]
language = "dart"
repository = "sterling-testing/taskmanager-dart"
output_dir = "../generated/dart"

[targets.scala]
language = "scala"
repository = "sterling-testing/taskmanager-scala"
output_dir = "../generated/scala"

[targets.swift]
language = "swift"
repository = "sterling-testing/taskmanager-swift"
output_dir = "../generated/swift"
